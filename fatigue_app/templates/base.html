<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>陸上競技短距離選手向け疲労管理支援システム</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="header-container">
            <h1>🏃 疲労管理支援システム</h1>
            <nav>
                <a href="{{ url_for('main.index') }}">トップ</a>
                <a href="{{ url_for('records.record_new') }}">記録入力</a>
                <a href="{{ url_for('records.record_list') }}">記録一覧</a>
                <a href="{{ url_for('settings.settings_page') }}">設定</a>
            </nav>
        </div>
    </header>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2025 疲労管理支援システム</p>
    </footer>
</body>
</html>
